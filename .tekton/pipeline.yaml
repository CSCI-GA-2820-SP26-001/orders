apiVersion: tekton.dev/v1
kind: Pipeline
metadata:
  name: orders-cd-pipeline
spec:
  description: |
    Minimal Tekton pipeline definition for the Orders service.
    Individual pipeline tasks will be added in separate stories.

  params:
    - name: repo-url
      type: string
      description: GitHub repository URL for the Orders service
    - name: revision
      type: string
      description: Git revision to build
      default: master
    - name: image-name
      type: string
      description: Container image name for the Orders service
    - name: base-url
      type: string
      description: OpenShift route URL used by BDD tests

  workspaces:
    - name: shared-workspace

  tasks:
    - name: clone
      taskRef:
        name: git-clone
        kind: ClusterTask
      workspaces:
        - name: output
          workspace: shared-workspace
      params:
        - name: url
          value: $(params.repo-url)
        - name: revision
          value: $(params.revision)
        - name: deleteExisting
          value: "true"
    - name: lint
      taskRef:
        name: lint
      runAfter:
        - clone
      workspaces:
        - name: source
          workspace: shared-workspace
  
    - name: test
      taskRef:
        name: test
        kind: Task
      runAfter:
        - clone
      workspaces:
        - name: source
          workspace: shared-workspace
