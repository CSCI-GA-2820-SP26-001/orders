<!DOCTYPE html>
<html lang="en">
  <head>
    <title>Orders UI</title>
    <meta charset="utf-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap@3.4.1/dist/css/bootstrap.min.css"
    >
  </head>
  <body>
    <div class="container">
      <div class="page-header">
        <h1>Orders UI</h1>
        <p class="lead">Orders administration console</p>
      </div>

      <!-- Flash Message -->
      <div class="table-responsive">
        <table class="table">
          <tr>
            <td>Status:</td>
            <td><span id="flash_message"></span></td>
          </tr>
        </table>
      </div>

      <!-- FORM -->
      <div class="col-md-12" id="form_data">
        <h3>Create, Retrieve, Update, Delete, and Search Orders:</h3>
        <div class="well">
          <div class="form-horizontal">
            <div class="form-group">
              <label class="control-label col-sm-2" for="order_id">Order ID:</label>
              <div class="col-sm-6">
                <input type="text" class="form-control" id="order_id" placeholder="Enter order id">
              </div>
              <div class="col-sm-4">
                <button type="button" class="btn btn-primary" id="retrieve-btn">Retrieve</button>
                <button type="button" class="btn btn-danger" id="delete-btn">Delete</button>
              </div>
            </div>
          </div>

          <div class="form-horizontal">
            <div class="form-group">
              <label class="control-label col-sm-2" for="order_customer_id">Customer ID:</label>
              <div class="col-sm-10">
                <input type="text" class="form-control" id="order_customer_id" placeholder="Enter customer id">
              </div>
            </div>

            <div class="form-group">
              <label class="control-label col-sm-2" for="order_name">Name:</label>
              <div class="col-sm-10">
                <input type="text" class="form-control" id="order_name" placeholder="Enter customer name">
              </div>
            </div>

            <div class="form-group">
              <label class="control-label col-sm-2" for="order_address">Address:</label>
              <div class="col-sm-10">
                <input type="text" class="form-control" id="order_address" placeholder="Enter shipping address">
              </div>
            </div>

            <div class="form-group">
              <label class="control-label col-sm-2" for="order_email">Email:</label>
              <div class="col-sm-10">
                <input type="email" class="form-control" id="order_email" placeholder="Enter email address">
              </div>
            </div>

            <div class="form-group">
              <label class="control-label col-sm-2" for="order_status">Status:</label>
              <div class="col-sm-10">
                <select class="form-control" id="order_status">
                  <option value="" selected>All</option>
                  <option value="Pending">Pending</option>
                  <option value="Paid">Paid</option>
                  <option value="Shipped">Shipped</option>
                  <option value="Cancelled">Cancelled</option>
                </select>
              </div>
            </div>

            <div class="form-group">
              <div class="col-sm-offset-2 col-sm-10">
                <button type="button" class="btn btn-primary" id="search-btn">Search</button>
                <button type="button" class="btn btn-default" id="clear-btn">Clear</button>
                <button type="button" class="btn btn-success" id="create-btn">Create</button>
                <button type="button" class="btn btn-warning" id="update-btn">Update</button>
                <button type="button" class="btn btn-danger" id="cancel-btn">Cancel</button>
              </div>
            </div>
          </div>
        </div>
      </div>

      <!-- Search Results -->
      <div class="table-responsive col-md-12" id="search_results">
        <table class="table table-striped">
          <thead>
            <tr>
              <th class="col-md-1">ID</th>
              <th class="col-md-2">Customer ID</th>
              <th class="col-md-2">Name</th>
              <th class="col-md-3">Address</th>
              <th class="col-md-2">Email</th>
              <th class="col-md-2">Status</th>
            </tr>
          </thead>
          <tbody></tbody>
        </table>
      </div>

      <footer>
        <br><br>
        <p>&copy; NYU DevOps Orders Service</p>
      </footer>
    </div>

    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@3.4.1/dist/js/bootstrap.min.js"></script>
    <script type="text/javascript" src="js/rest_api.js"></script>
  </body>
</html>
