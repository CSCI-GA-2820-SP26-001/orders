<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Orders UI</title>
    <link
        rel="stylesheet"
        href="https://cdn.jsdelivr.net/npm/bootstrap@3.4.1/dist/css/bootstrap.min.css"
    >
</head>
<body>
    <div class="container">
        <div class="page-header">
            <h1>Orders Administration</h1>
            <p class="lead">BDD test environment for the Orders UI</p>
        </div>

        <div id="flash_message" class="alert alert-info" role="alert">
            Orders UI environment ready
        </div>

        <div class="well">
            <form class="form-horizontal">
                <div class="form-group">
                    <label class="control-label col-sm-2" for="order_id">Order ID:</label>
                    <div class="col-sm-10">
                        <input type="text" class="form-control" id="order_id" placeholder="Order ID">
                    </div>
                </div>

                <div class="form-group">
                    <label class="control-label col-sm-2" for="order_customer_id">Customer ID:</label>
                    <div class="col-sm-10">
                        <input type="text" class="form-control" id="order_customer_id" placeholder="Customer ID">
                    </div>
                </div>

                <div class="form-group">
                    <label class="control-label col-sm-2" for="order_name">Name:</label>
                    <div class="col-sm-10">
                        <input type="text" class="form-control" id="order_name" placeholder="Customer Name">
                    </div>
                </div>

                <div class="form-group">
                    <label class="control-label col-sm-2" for="order_address">Address:</label>
                    <div class="col-sm-10">
                        <input type="text" class="form-control" id="order_address" placeholder="Shipping Address">
                    </div>
                </div>

                <div class="form-group">
                    <label class="control-label col-sm-2" for="order_email">Email:</label>
                    <div class="col-sm-10">
                        <input type="email" class="form-control" id="order_email" placeholder="Email Address">
                    </div>
                </div>

                <div class="form-group">
                    <label class="control-label col-sm-2" for="order_status">Status:</label>
                    <div class="col-sm-10">
                        <select class="form-control" id="order_status">
                            <option value="Pending" selected>Pending</option>
                            <option value="Paid">Paid</option>
                            <option value="Shipped">Shipped</option>
                            <option value="Cancelled">Cancelled</option>
                        </select>
                    </div>
                </div>

                <div class="form-group">
                    <div class="col-sm-offset-2 col-sm-10">
                        <button type="button" class="btn btn-primary" id="search-btn">Search</button>
                        <button type="button" class="btn btn-info" id="retrieve-btn">Retrieve</button>
                        <button type="button" class="btn btn-default" id="clear-btn">Clear</button>
                        <button type="button" class="btn btn-success" id="create-btn">Create</button>
                        <button type="button" class="btn btn-warning" id="update-btn">Update</button>
                        <button type="button" class="btn btn-danger" id="delete-btn">Delete</button>
                        <button type="button" class="btn btn-danger" id="cancel-btn">Cancel</button>
                    </div>
                </div>
            </form>
        </div>

        <div id="search_results" class="well">
            <strong>Search results will appear here.</strong>
        </div>

        <footer>
            <hr>
            <p>&copy; NYU DevOps Orders Service</p>
        </footer>
    </div>

    <script src="/static/js/rest_api.js"></script>
</body>
</html>
